[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "netlify/functions/content-snapshot-fallback.json",
    "netlify/functions/seo-gameplan.json"
  ]

[functions."keyword-weekly-sync"]
  schedule = "@weekly"

[functions."ga4"]
  schedule = "@daily"

[[redirects]]
  from = "/api/content-snapshot"
  to = "/.netlify/functions/content-snapshot"
  status = 200

[[redirects]]
  from = "/api/competitors"
  to = "/.netlify/functions/competitors"
  status = 200

