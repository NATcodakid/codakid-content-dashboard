[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "netlify/functions/content-snapshot-fallback.json",
    "netlify/functions/seo-gameplan.json"
  ]

[[redirects]]
  from = "/api/content-snapshot"
  to = "/.netlify/functions/content-snapshot"
  status = 200

[[redirects]]
  from = "/api/competitors"
  to = "/.netlify/functions/competitors"
  status = 200

[[redirects]]
  from = "/api/ai-insights"
  to = "/.netlify/functions/ai-insights"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/auth/invite"
  to = "/.netlify/functions/auth-invite"
  status = 200

[[redirects]]
  from = "/api/auth/accept-invite"
  to = "/.netlify/functions/auth-accept-invite"
  status = 200

[[redirects]]
  from = "/api/auth/users"
  to = "/.netlify/functions/auth-users"
  status = 200

[[redirects]]
  from = "/api/auth/bootstrap-admin"
  to = "/.netlify/functions/auth-bootstrap-admin"
  status = 200

[[redirects]]
  from = "/api/google/oauth/start"
  to = "/.netlify/functions/google-oauth-start"
  status = 200

[[redirects]]
  from = "/api/google/oauth/callback"
  to = "/.netlify/functions/google-oauth-callback"
  status = 200

[[redirects]]
  from = "/api/google/search-console/status"
  to = "/.netlify/functions/google-search-console-status"
  status = 200

[[redirects]]
  from = "/api/google/search-console/sync"
  to = "/.netlify/functions/google-search-console-sync"
  status = 200

[[redirects]]
  from = "/api/gsc/import"
  to = "/.netlify/functions/gsc-import"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
